<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>yohaku</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>&#20313;&#30333; <span class="rom">yohaku</span></h1>
    <div class="controls">
      <div id="book-picker" class="picker"></div>
      <div id="chapter-nav" class="nav"></div>
      <label>Density
        <select id="density">
          <option value="100">100%</option>
          <option value="60" selected>60%</option>
          <option value="40">40%</option>
        </select>
      </label>
      <label class="check"><input type="checkbox" id="dialogue-mode" /> Dialogue-forward</label>
      <span id="cost-meter" class="cost"></span>
    </div>
  </header>

  <div id="status" class="status" hidden></div>

  <!-- Beat strip: Tier 2 storyboard. Hidden until beat detection lands. -->
  <section id="beat-strip" class="beat-strip" aria-label="Beat strip"></section>

  <main id="reader" class="reader">
    <p class="placeholder">Drop an .epub at <code>data/books/&lt;name&gt;/source.epub</code>, then pick it above.</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
